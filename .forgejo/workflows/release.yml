name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install mise
        run: |
          curl https://mise.run | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install toolchain
        run: mise install

      - uses: actions/cache@v4
        with:
          path: deps
          key: ${{ runner.os }}-mix-${{ hashFiles('**/mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-

      - name: Install deps
        run: mise exec -- env MIX_ENV=prod mix deps.get --only prod

      - name: Test
        run: mise exec -- mix deps.get && mise exec -- mix test

      - name: Build MCP release
        run: mise exec -- env MIX_ENV=prod mix release roundtable_mcp

      - name: Build CLI escript
        run: mise exec -- env MIX_ENV=prod mix escript.build

      - name: Package artifacts
        run: |
          VERSION="${GITHUB_REF_NAME#v}"

          # Add docs to the release tree before archiving
          cp SKILL.md _build/prod/rel/roundtable_mcp/
          cp INSTALL.md _build/prod/rel/roundtable_mcp/

          # Make the wrapper executable inside the tarball
          chmod +x _build/prod/rel/roundtable_mcp/bin/roundtable-mcp

          # Create the MCP server tarball (BEAM bytecode is OTP-portable — no ERTS bundled)
          MCP_TARBALL="roundtable-mcp-${VERSION}.tar.gz"
          tar czf "$MCP_TARBALL" -C _build/prod/rel roundtable_mcp

          # Checksums for both artifacts
          sha256sum "$MCP_TARBALL" roundtable-cli > SHA256SUMS

          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "MCP_TARBALL=${MCP_TARBALL}" >> "$GITHUB_ENV"

      - name: Publish release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Create the release entry
          RELEASE_ID=$(curl -sf \
            -X POST \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Content-Type: application/json" \
            "${GITHUB_SERVER_URL}/api/v1/repos/${GITHUB_REPOSITORY}/releases" \
            -d "{
              \"tag_name\": \"${GITHUB_REF_NAME}\",
              \"name\": \"Roundtable ${GITHUB_REF_NAME}\",
              \"draft\": false,
              \"prerelease\": false
            }" | jq -r .id)

          # Upload MCP server tarball
          curl -sf \
            -X POST \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Content-Type: application/gzip" \
            "${GITHUB_SERVER_URL}/api/v1/repos/${GITHUB_REPOSITORY}/releases/${RELEASE_ID}/assets?name=${MCP_TARBALL}" \
            --data-binary "@${MCP_TARBALL}"

          # Upload CLI escript
          curl -sf \
            -X POST \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Content-Type: application/octet-stream" \
            "${GITHUB_SERVER_URL}/api/v1/repos/${GITHUB_REPOSITORY}/releases/${RELEASE_ID}/assets?name=roundtable-cli" \
            --data-binary "@roundtable-cli"

          # Upload checksums
          curl -sf \
            -X POST \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Content-Type: text/plain" \
            "${GITHUB_SERVER_URL}/api/v1/repos/${GITHUB_REPOSITORY}/releases/${RELEASE_ID}/assets?name=SHA256SUMS" \
            --data-binary "@SHA256SUMS"
